# .github/workflows/deploy.yml
# CI/CD pipeline for the static website.
# On PR: validate + plan (dev)
# On merge to main: apply dev → approve → apply prod

name: Static Website Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'modules/**'
      - 'envs/**'
      - '.github/workflows/deploy.yml'
  push:
    branches: [main]

env:
  TF_VERSION: "1.7.0"

jobs:
  # ── Validate module and dev environment ─────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init module (no backend)
        run: terraform init -backend=false
        working-directory: modules/s3-static-website

      - name: Validate module
        run: terraform validate
        working-directory: modules/s3-static-website

      - name: Init dev (no backend)
        run: terraform init -backend=false
        working-directory: envs/dev

      - name: Validate dev
        run: terraform validate
        working-directory: envs/dev

  # ── Plan dev ─────────────────────────────────────────────────────────────
  plan-dev:
    name: Plan (dev)
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      TF_VAR_bucket_name: ${{ secrets.DEV_BUCKET_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Init
        run: terraform init
        working-directory: envs/dev

      - name: Plan
        id: plan
        run: terraform plan -out=dev.tfplan -no-color
        working-directory: envs/dev

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-tfplan-${{ github.sha }}
          path: envs/dev/dev.tfplan
          retention-days: 7

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan — dev environment
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ── Apply dev (on merge to main) ─────────────────────────────────────────
  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: plan-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_bucket_name: ${{ secrets.DEV_BUCKET_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-tfplan-${{ github.sha }}
          path: envs/dev

      - name: Init
        run: terraform init
        working-directory: envs/dev

      - name: Apply
        run: terraform apply -auto-approve dev.tfplan
        working-directory: envs/dev

      - name: Output website URL
        run: terraform output website_url
        working-directory: envs/dev

  # ── Invalidate CloudFront cache after deploy ──────────────────────────────
  invalidate-cache:
    name: Invalidate CloudFront cache
    runs-on: ubuntu-latest
    needs: apply-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        run: terraform init
        working-directory: envs/dev
        env:
          TF_VAR_bucket_name: ${{ secrets.DEV_BUCKET_NAME }}

      - name: Get distribution ID and invalidate
        run: |
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths '/*'
          echo "Cache invalidated for distribution: $DIST_ID"
        working-directory: envs/dev
        env:
          TF_VAR_bucket_name: ${{ secrets.DEV_BUCKET_NAME }}
