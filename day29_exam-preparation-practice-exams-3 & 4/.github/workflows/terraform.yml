# =============================================================================
# .github/workflows/terraform.yml
# Day 29: Terraform Associate Exam Prep — Practice Exams 3 & 4
# 30-Day Terraform Challenge | AWS AI/ML UserGroup Kenya | EveOps
#
# EXAM CONCEPT: Terraform workflow in CI/CD
# The pipeline enforces the correct command order:
#   init -> fmt check -> validate -> plan -> apply
#
# EXAM NOTE: terraform validate requires init (providers must be installed).
# EXAM NOTE: terraform fmt -check fails the pipeline if files need formatting.
#            It does NOT reformat files in CI — only reports.
# =============================================================================

name: Terraform Day 29 CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.5.7"

jobs:
  validate:
    name: Fmt + Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # EXAM: fmt -check reports formatting issues, does not fix them
      - name: terraform fmt check
        run: terraform fmt -check -recursive

      # EXAM: init must run before validate — providers must be installed
      - name: terraform init
        run: terraform init -backend=false

      # EXAM: validate checks syntax and consistency, does NOT contact AWS
      - name: terraform validate
        run: terraform validate

  plan:
    name: Plan (dev)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: terraform init
        run: terraform init

      - name: terraform workspace select dev
        run: terraform workspace select dev || terraform workspace new dev

      - name: terraform plan
        run: terraform plan -var-file="environments/dev/terraform.tfvars" -no-color
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  apply:
    name: Apply (prod)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: terraform init
        run: terraform init

      - name: terraform workspace select prod
        run: terraform workspace select prod || terraform workspace new prod

      - name: terraform apply
        run: terraform apply -auto-approve -var-file="environments/prod/terraform.tfvars"
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}